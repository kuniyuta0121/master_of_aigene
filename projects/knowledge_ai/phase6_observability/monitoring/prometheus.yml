# Phase 6: Prometheus 設定
# ==========================
# 考えてほしい疑問:
#   Q1. Pull型（Prometheusがスクレイプ）と Push型（アプリがメトリクスを送る）の違いは？
#   Q2. scrape_interval を短くすると何が起きるか？（CPU・ストレージ）
#   Q3. このPrometheusは1台（SPOF）。本番でどう冗長化するか？

global:
  scrape_interval: 15s      # 15秒ごとにメトリクスを収集
  evaluation_interval: 15s  # 15秒ごとにアラートルールを評価

# アラートルール（SLO違反の通知）
rule_files:
  - "alert_rules.yml"

# Alertmanager（Slack/PagerDutyへの通知ルーティング）
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # KnowledgeAI APIのメトリクス収集
  - job_name: "knowledge_ai_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"  # Phase 6で実装するエンドポイント

  # PostgreSQL のメトリクス（postgres_exporter経由）
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Prometheusが自分自身を監視
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
