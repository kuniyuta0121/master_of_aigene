# Phase 4: CI パイプライン（継続的インテグレーション）
# ========================================================
# 考えてほしい疑問:
#   Q1. なぜ PR のたびにテストを自動実行するのか？（コードレビューで手動テストしてはダメか？）
#   Q2. matrix を使うメリットは何か？（複数Pythonバージョンで並列テスト）
#   Q3. テストが失敗したとき、マージを物理的にブロックするにはどう設定するか？
#   Q4. secrets.GITHUB_TOKEN と個人アクセストークンの違いは？

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # --- リント・型チェック ---
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"   # pip キャッシュでインストール時間を短縮

      - name: Install tools
        run: pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        # [考える] ruff はなぜ flake8 + black より速いのか？（Rust実装）
        run: ruff check phase1_api/ phase2_ai/

      - name: Run mypy (static type check)
        run: mypy phase1_api/ --ignore-missing-imports

  # --- テスト ---
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # 複数バージョンで並列テスト
      fail-fast: false  # 一方が失敗しても他方は続ける

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: phase1_api
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: phase1_api
        run: |
          pytest test_notes.py -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70   # カバレッジ70%未満は失敗

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./phase1_api/coverage.xml

  # --- Dockerビルド確認 ---
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f phase3_docker/Dockerfile \
            -t knowledge-ai:test \
            --target production \
            .

      - name: Check image size
        run: |
          SIZE=$(docker image inspect knowledge-ai:test --format='{{.Size}}')
          echo "Image size: $((SIZE / 1024 / 1024)) MB"
          # [実装してみよう] サイズが300MB以上ならビルドを失敗させる

  # --- セキュリティスキャン ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"   # 重大な脆弱性があればCIを失敗させる
