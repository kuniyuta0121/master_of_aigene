global:
  scrape_interval: 10s

scrape_configs:
  - job_name: api_gateway
    static_configs:
      - targets: ["api_gateway:8000"]
    metrics_path: /metrics

  - job_name: note_service
    static_configs:
      - targets: ["note_service:8001"]
    metrics_path: /metrics

  - job_name: search_service
    static_configs:
      - targets: ["search_service:8002"]
    metrics_path: /metrics

  - job_name: analytics_service
    static_configs:
      - targets: ["analytics_service:8003"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
